<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="watch">
  <button onclick="history.back()">⬅ กลับ</button>

  <h1 id="title"></h1>

  <div class="player">
    <iframe id="frame" allowfullscreen></iframe>
  </div>

  <div id="servers"></div>
</div>

<script src="data.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id")
const anime = data.find(x => x.id == id)

document.getElementById("title").innerText = anime.title

const frame = document.getElementById("frame")
const servers = document.getElementById("servers")

function play(url){
  frame.src = url
}

const ep = anime.episodes[0]

// default play server 1
play(ep.servers[0])

// build server buttons
ep.servers.forEach((s, i) => {
  const btn = document.createElement("button")
  btn.innerText = "Server " + (i+1)
  btn.onclick = () => play(s)
  servers.appendChild(btn)
})
</script>

</body>
</html>
