<div class="topbar">
  <h1>WJB Anime</h1>
  <input id="search" placeholder="ค้นหาอนิเมะ...">
</div>

<div class="grid" id="grid"></div>

<script src="data.js"></script>
<script>
const grid = document.getElementById("grid")

function render(list){
  grid.innerHTML = ""

  list.forEach(a=>{
    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <div class="poster"></div>
      <h3>${a.title}</h3>
    `

    div.onclick = ()=>{
      location.href = "watch.html?id="+a.id
    }

    grid.appendChild(div)
  })
}

}
</script>

</html>
