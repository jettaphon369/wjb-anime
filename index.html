<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WJB Dashboard</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

<h1>📦 WJB Media Dashboard</h1>

<div class="grid">
<div class="card"><h3>🖼 Images</h3><p id="imgCount">0</p></div>
<div class="card"><h3>🎥 Videos</h3><p id="videoCount">0</p></div>
<div class="card"><h3>📁 Total Files</h3><p id="totalCount">0</p></div>
<div class="card"><h3>💾 Storage</h3><p id="storageInfo">0 MB</p></div>
</div>

<div class="storage">
<div class="bar"><div id="barFill"></div></div>
</div>

<div class="upload">
<input type="file" id="fileInput">
<button onclick="upload()">📤 Upload</button>
</div>

<h2>🕒 Recent Upload</h2>
<div id="recent"></div>

</div>

<script src="./app.js"></script>
</body>
</html>
