<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WJB Storage</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">

    <h1>📦 WJB Media Storage</h1>

    <div class="storage-box">
      <div class="storage-info" id="storageInfo"></div>
      <div class="bar">
        <div class="fill" id="storageBar"></div>
      </div>
    </div>

    <div class="upload-box">
      <input type="file" id="fileInput">
      <button onclick="uploadFile()">📤 อัปโหลด</button>
    </div>

    <div class="gallery" id="gallery"></div>

  </div>

  <div class="modal" id="upgradeModal">
    <div class="modal-box">
      <h2>⚠️ พื้นที่เต็ม</h2>
      <p>คุณใช้พื้นที่เกินโควต้า</p>

      <ul>
        <li>100GB = 59 บาท/เดือน</li>
        <li>500GB = 199 บาท/เดือน</li>
        <li>1TB = 399 บาท/เดือน</li>
      </ul>

      <button onclick="closeModal()">ปิด</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
