<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Pet House Defense v3.0 — Floating Grass Island</title>
<link rel="stylesheet" href="style.css?v=4.0">

</head>
<body>
<div id="app">

  <div class="screen active" id="screen-menu">
    <div class="stars-bg" id="starsBg"></div>
    <div class="title-wrap">
      <div class="paw-deco">🐾</div>
      <div class="logo">PET HOUSE<small>DEFENSE</small></div>
    </div>
    <div class="menu-btns">
      <button class="big-btn coral" onclick="UI.go('worldmap')">▶ PLAY</button>
      <button class="big-btn" onclick="UI.go('characters')">🐶 CHARACTERS</button>
      <button class="big-btn mint" onclick="UI.go('shop')">💎 SHOP</button>
      <button class="big-btn ghost" onclick="UI.go('achievements')">🏆 ACHIEVEMENTS</button>
      <button class="big-btn ghost" onclick="UI.go('settings')">⚙ SETTINGS</button>
    </div>
    <div class="smallnote">v3.0 · Floating Grass Island</div>
  </div>

  <div class="screen" id="screen-worldmap">
    <div class="top-left-back"><button class="icon-btn" onclick="UI.go('menu')">←</button></div>
    <div class="icon-row"><div class="icon-btn" id="coinDisplayMap">💰0</div></div>
    <div id="worldMapScroll"><div id="worldMapTrack"></div></div>
  </div>

  <div class="screen" id="screen-characters">
    <div class="top-left-back"><button class="icon-btn" onclick="UI.go('menu')">←</button></div>
    <h2 class="panel-title" style="margin-top:0">YOUR HEROES</h2>
    <div id="charScreenGrid"></div>
  </div>

  <div class="screen" id="screen-shop">
    <div class="top-left-back"><button class="icon-btn" onclick="UI.go('menu')">←</button></div>
    <div class="icon-row"><div class="icon-btn" id="coinDisplayShop">💰0</div></div>
    <h2 class="panel-title" style="margin-top:0">SHOP</h2>
    <div id="shopGrid" class="listPanel"></div>
  </div>

  <div class="screen" id="screen-settings">
    <div class="top-left-back"><button class="icon-btn" onclick="UI.go('menu')">←</button></div>
    <div class="panel" style="width:min(90vw,380px)">
      <h2 class="panel-title">SETTINGS</h2>
      <div class="settRow"><label>🎵 Music</label><input type="range" id="musicSlider" min="0" max="100" value="70"></div>
      <div class="settRow"><label>🔊 Sound</label><input type="range" id="sfxSlider" min="0" max="100" value="80"></div>
      <div class="settRow"><label>🌐 Language</label><select id="langSelect"><option>English</option><option>Español</option><option>Français</option></select></div>
      <div class="settRow"><label>✨ Quality</label><select id="qualSelect"><option value="high">High</option><option value="low">Low</option></select></div>
      <div class="settRow" style="border-bottom:none"><label>⛶ Fullscreen</label><button class="big-btn ghost" style="padding:8px 14px;font-size:13px" onclick="toggleFullscreen()">Toggle</button></div>
    </div>
  </div>

  <div class="screen" id="screen-achievements">
    <div class="top-left-back"><button class="icon-btn" onclick="UI.go('menu')">←</button></div>
    <h2 class="panel-title" style="margin-top:0">MISSIONS & ACHIEVEMENTS</h2>
    <div class="listPanel" id="missionList"></div>
  </div>

  <div class="screen" id="screen-battle">
    <canvas id="gameCanvas"></canvas>
    <div id="hpBarLayer"></div>
    <div id="hud-top">
      <div id="energyPill">⚡<span id="energyVal">150</span></div>
      <div id="cardTray"></div>
      <button class="icon-btn" id="menuBtnBattle" onclick="Game.pauseMenu()">☰</button>
    </div>
    <div id="hud-bottom">
      <div id="levelLabel">Lvl 1</div>
      <div id="baseHpWrap"><div id="baseHpFill"></div></div>
      <div id="waveLabel">Wave 1/3</div>
      <div id="speedBtn" onclick="Game.toggleSpeed()">x1</div>
    </div>
    <div id="pauseOverlay"><span>PAUSED<br><small style="font-size:14px;opacity:.8">tap ☰ to resume</small></span></div>
    <div id="endgameOverlay">
      <div class="panel endgame-card">
        <h2 id="endgameTitle">VICTORY!</h2>
        <div class="starsRow" id="endgameStars">★★★</div>
        <p id="endgameReward" style="margin:6px 0 16px;">+50 Coins</p>
        <div class="menu-btns" style="width:100%">
          <button class="big-btn mint" onclick="Game.retry()">RETRY</button>
          <button class="big-btn coral" id="nextLevelBtn" onclick="Game.nextLevel()">NEXT LEVEL</button>
          <button class="big-btn ghost" onclick="UI.go('worldmap')">MAP</button>
        </div>
      </div>
    </div>
  </div>

  <div class="rotateHint" id="rotateHint"><div style="font-size:44px">🔄</div><p>Rotate your device for the best experience!</p></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous" referrerpolicy="no-referrer" onerror="window.__threeLoadFailed=true;"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="game.js?v=4.5"></script>
</body>
</html>
