<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pet House Defense WebGL 3D V1</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#9be7ff;color:#fff}
#game{position:fixed;inset:0}
#ui{position:fixed;inset:0;pointer-events:none}
.top{position:absolute;left:10px;right:10px;top:10px;height:104px;background:linear-gradient(#8b5129,#51270f);border-radius:16px;box-shadow:0 6px 0 #2e1609,0 12px 22px #0006;display:flex;align-items:center;gap:8px;padding:8px;pointer-events:auto}
.energy{width:86px;height:86px;border-radius:14px;background:#261309;color:#fff06a;text-align:center;font-weight:bold;padding-top:7px;box-shadow:inset 0 0 0 3px #c48943}.energy .sun{font-size:34px}
.cards{display:flex;gap:8px;overflow-x:auto;flex:1;height:90px;align-items:center}
.card{min-width:88px;height:86px;background:linear-gradient(#fff,#dff3ff);border:3px solid #2b170b;border-radius:10px;box-shadow:0 4px 0 #1d0f07;color:#321c0a;text-align:center;font-weight:bold;position:relative}.card.active{outline:4px solid #ffd22e}.card .icon{font-size:30px;margin-top:5px}.card .name{font-size:11px}.card .cost{position:absolute;left:0;right:0;bottom:0;background:#f4e4b6;font-size:13px;padding:2px}
.menuBtn{width:78px;height:66px;border:0;border-radius:12px;background:linear-gradient(#e6eef8,#667080);box-shadow:0 5px 0 #30333a;color:white;font-size:17px;font-weight:bold}
.leftHud{position:absolute;left:12px;top:126px;display:grid;gap:8px}.wood{background:linear-gradient(#8b5129,#51270f);border-radius:10px;padding:8px;box-shadow:0 4px 0 #2e1609;font-weight:bold;text-align:center;text-shadow:0 2px #000}
.bottom{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:end;justify-content:space-between}.progress{width:250px;height:24px;border:3px solid #111;border-radius:20px;background:#263326;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,#5fd34a,#cfff5a);width:0%}.btn{pointer-events:auto;border:0;border-radius:12px;background:#333;color:white;font-weight:bold;padding:12px 16px}
.centerMsg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#000b;border:2px solid #fff5;border-radius:24px;padding:24px;text-align:center;display:none;pointer-events:auto}.centerMsg h2{font-size:34px;margin:0 0 10px}.centerMsg button{font-size:18px;margin:5px;border:0;border-radius:14px;padding:12px 18px;background:#ffd04a;font-weight:bold}
.tip{position:absolute;left:50%;top:122px;transform:translateX(-50%);background:#0007;border-radius:999px;padding:6px 12px;font-size:13px}
@media(max-width:700px){.top{height:96px}.energy{width:72px;height:78px}.card{min-width:76px;height:78px}.card .icon{font-size:24px}.menuBtn{width:62px;font-size:14px}.leftHud{display:none}.progress{width:135px}.tip{display:none}}
</style>
</head>
<body>
<div id="game"></div>
<div id="ui">
  <div class="top"><div class="energy"><div class="sun">☀️</div><div id="energy">160</div></div><div class="cards" id="cards"></div><button class="menuBtn" onclick="restart()">Reset</button></div>
  <div class="tip">เลือกการ์ด แล้วแตะช่องสนามเพื่อวางตัวละคร 3D</div>
  <div class="leftHud"><div class="wood">WAVE<br><span id="wave">1</span></div><div class="wood">HP<br><span id="hp">20/20</span></div></div>
  <div class="bottom"><div class="wood">WebGL 3D</div><button class="btn" onclick="toggleTime()">Day / Night</button><div class="progress"><i id="progress"></i></div></div>
  <div class="centerMsg" id="msg"><h2 id="msgTitle"></h2><p id="msgText"></p><button onclick="restart()">เล่นใหม่</button></div>
</div>
<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const ROWS=5,COLS=9, cellW=1.55, cellD=1.32;
const heroes=[
 {id:'brisky',name:'BRISKY',icon:'🐶',cost:40,color:0xb8753b,atk:18,rate:.85,bullet:0xd9f05f,type:'dog'},
 {id:'mio',name:'MIO',icon:'🐱',cost:50,color:0x6b6cff,atk:36,rate:1.15,bullet:0xae65ff,type:'mage'},
 {id:'gabby',name:'GABBY',icon:'🦆',cost:60,color:0xffd64a,atk:20,rate:.65,bullet:0xdddddd,type:'duck'},
 {id:'wind',name:'WIND',icon:'🏹',cost:60,color:0x59d28b,atk:32,rate:.95,bullet:0x8ef2ff,type:'archer'},
 {id:'titan',name:'TITAN',icon:'🛡️',cost:70,color:0x5290ff,atk:0,rate:0,wall:true,type:'knight'},
 {id:'rian',name:'RIAN',icon:'⚔️',cost:90,color:0xffc24a,atk:62,rate:1.1,bullet:0xffffff,type:'boy'},
 {id:'kaisen',name:'KAISEN',icon:'🗡️',cost:120,color:0x39d069,atk:54,rate:.78,bullet:0x37ff62,type:'sword'}
];
let selected='brisky', energy=160, baseHp=20, spawned=0, total=45, gameOver=false, night=false;
let plants=[], enemies=[], bullets=[], stars=[], spawnTimer=0, starTimer=0, last=0;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x9be7ff); scene.fog=new THREE.Fog(0x9be7ff,16,38);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,100); camera.position.set(0,13.5,12.5); camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled=true; game.appendChild(renderer.domElement);
const hemi=new THREE.HemisphereLight(0xffffff,0x5b8c4a,1.1); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffffff,1.4); sun.position.set(-7,12,8); sun.castShadow=true; scene.add(sun);
const board=new THREE.Group(); scene.add(board);
const startX=-(COLS-1)*cellW/2, startZ=-(ROWS-1)*cellD/2;
const raycaster=new THREE.Raycaster(), pointer=new THREE.Vector2(), placeMeshes=[];

function cellPos(r,c){return new THREE.Vector3(startX+c*cellW,0,startZ+r*cellD)}
function box(w,h,d,color){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color,roughness:.7,metalness:.04}));m.castShadow=true;m.receiveShadow=true;return m}
function boardBuild(){
 const base=box(COLS*cellW+1,.35,ROWS*cellD+1,0x2f792c);base.position.y=-.25;board.add(base);
 for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const tile=box(cellW*.98,.16,cellD*.98,(r+c)%2?0x58ba43:0x65c94e);const p=cellPos(r,c);tile.position.set(p.x,0,p.z);tile.userData={r,c,place:c<6};board.add(tile);placeMeshes.push(tile)}
 const house=new THREE.Group();const body=box(1.1,1.1,1.05,0xc98345);body.position.y=.65;house.add(body);const roof=new THREE.Mesh(new THREE.ConeGeometry(.9,.75,4),new THREE.MeshStandardMaterial({color:0x2384d1}));roof.rotation.y=Math.PI/4;roof.position.y=1.55;roof.castShadow=true;house.add(roof);const door=box(.42,.55,.08,0x3b2618);door.position.set(0,.33,.57);house.add(door);house.position.copy(cellPos(2,0));house.position.x-=.95;board.add(house);
}
function heroModel(h){const g=new THREE.Group();const body=new THREE.Mesh(new THREE.SphereGeometry(.34,32,20),new THREE.MeshStandardMaterial({color:h.color}));body.scale.set(1,.95,.8);body.position.y=.55;body.castShadow=true;g.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(.42,32,20),new THREE.MeshStandardMaterial({color:h.type==='dog'?0xc58a54:h.color}));head.position.y=1.08;head.castShadow=true;g.add(head);for(const x of[-.13,.13]){const e=new THREE.Mesh(new THREE.SphereGeometry(.045,12,8),new THREE.MeshStandardMaterial({color:0x111111}));e.position.set(x,1.13,.36);g.add(e)}if(h.type==='dog'){for(const x of[-.28,.28]){const ear=new THREE.Mesh(new THREE.ConeGeometry(.13,.42,16),new THREE.MeshStandardMaterial({color:0x8d5b35}));ear.position.set(x,1.35,.02);ear.rotation.z=x<0?.55:-.55;g.add(ear)}}else if(h.type==='mage'){const hat=new THREE.Mesh(new THREE.ConeGeometry(.34,.75,32),new THREE.MeshStandardMaterial({color:0x3633ad}));hat.position.y=1.55;g.add(hat)}else if(h.type==='duck'){const beak=box(.22,.1,.22,0xff8d24);beak.position.set(0,1.08,.42);g.add(beak)}else if(h.type==='knight'){const shield=box(.4,.55,.1,0x2a69c7);shield.position.set(.42,.6,.15);g.add(shield)}else{const sword=box(.08,.9,.08,0xddefff);sword.position.set(.45,.85,.12);sword.rotation.z=-.35;g.add(sword)}return g}
function enemyModel(kind){const g=new THREE.Group(), col=kind==='tank'?0x7c9672:kind==='runner'?0x95c983:0x78b66c;const body=new THREE.Mesh(new THREE.SphereGeometry(.42,32,20),new THREE.MeshStandardMaterial({color:col}));body.scale.set(1,1.05,.85);body.position.y=.72;body.castShadow=true;g.add(body);const head=new THREE.Mesh(new THREE.SphereGeometry(.38,32,20),new THREE.MeshStandardMaterial({color:col}));head.position.y=1.18;g.add(head);for(const x of[-.13,.13]){const eye=new THREE.Mesh(new THREE.SphereGeometry(.055,12,8),new THREE.MeshStandardMaterial({color:0xffffff}));eye.position.set(x,1.2,.33);g.add(eye)}return g}

function renderCards(){cards.innerHTML='';for(const h of heroes){const b=document.createElement('button');b.className='card '+(selected===h.id?'active':'');b.innerHTML=`<div class="name">${h.name}</div><div class="icon">${h.icon}</div><div class="cost">☀️ ${h.cost}</div>`;b.onclick=()=>{selected=h.id;renderCards()};cards.appendChild(b)}}
function updateUI(){document.getElementById('energy').textContent=Math.floor(energy);hp.textContent=baseHp+'/20';wave.textContent=Math.min(10,Math.ceil(spawned/Math.max(1,total/10)))+'/10';progress.style.width=(spawned/total*100)+'%'}
function placeHero(r,c){if(gameOver||c>5||plants.some(p=>p.r===r&&p.c===c))return;const h=heroes.find(x=>x.id===selected);if(!h||energy<h.cost){energyElFlash();return}energy-=h.cost;const model=heroModel(h),p=cellPos(r,c);model.position.set(p.x,.05,p.z);board.add(model);plants.push({r,c,h,model,cd:.3,hp:h.wall?900:150});navigator.vibrate&&navigator.vibrate(20);updateUI()}
function spawnEnemy(){if(spawned>=total)return;spawned++;const r=Math.floor(Math.random()*ROWS),tank=Math.random()<.2,runner=!tank&&Math.random()<.22,kind=tank?'tank':runner?'runner':'goblin';const model=enemyModel(kind),p=cellPos(r,COLS-1);model.position.set(p.x+2,.05,p.z);board.add(model);enemies.push({r,x:p.x+2,z:p.z,hp:tank?170:90,max:tank?170:90,sp:runner?1.4:tank?.55:.85,model})}
function shoot(p,dt){if(p.h.wall)return;p.cd-=dt;const target=enemies.find(e=>e.r===p.r&&e.x>p.model.position.x);if(target&&p.cd<=0){p.cd=p.h.rate;p.model.scale.set(1.18,.92,1.18);const m=new THREE.Mesh(new THREE.SphereGeometry(.13,16,12),new THREE.MeshStandardMaterial({color:p.h.bullet,emissive:p.h.bullet,emissiveIntensity:.35}));m.position.set(p.model.position.x+.5,.85,p.model.position.z);board.add(m);bullets.push({model:m,r:p.r,x:m.position.x,dmg:p.h.atk,sp:p.h.magic?3.2:4.1})}}
function restart(){plants.forEach(o=>board.remove(o.model));enemies.forEach(o=>board.remove(o.model));bullets.forEach(o=>board.remove(o.model));plants=[];enemies=[];bullets=[];energy=160;baseHp=20;spawned=0;spawnTimer=0;starTimer=0;gameOver=false;msg.style.display='none';updateUI()}
function win(){gameOver=true;msgTitle.textContent='ผ่านด่านแล้ว 🎉';msgText.textContent='เว็บเกม 3D/WebGL ทำงานสำเร็จ';msg.style.display='block'}function lose(){gameOver=true;msgTitle.textContent='แพ้แล้ว 😭';msgText.textContent='ศัตรูบุกถึงบ้าน';msg.style.display='block'}
function energyElFlash(){energy.animate([{transform:'scale(1)'},{transform:'scale(1.3)'},{transform:'scale(1)'}],{duration:220});navigator.vibrate&&navigator.vibrate(35)}
window.restart=restart; window.toggleTime=()=>{night=!night;scene.background.set(night?0x14213f:0x9be7ff);scene.fog.color.set(night?0x14213f:0x9be7ff);sun.intensity=night?.45:1.4;hemi.intensity=night?.55:1.1}
renderer.domElement.addEventListener('pointerdown',ev=>{const rect=renderer.domElement.getBoundingClientRect();pointer.x=((ev.clientX-rect.left)/rect.width)*2-1;pointer.y=-((ev.clientY-rect.top)/rect.height)*2+1;raycaster.setFromCamera(pointer,camera);const hit=raycaster.intersectObjects(placeMeshes,false)[0];if(hit){const d=hit.object.userData;if(d.place)placeHero(d.r,d.c)}})
function loop(now){requestAnimationFrame(loop);const dt=Math.min(.05,(now-last)/1000||0);last=now;if(!gameOver){spawnTimer+=dt;if(spawnTimer>Math.max(.75,2.1-spawned*.018)){spawnTimer=0;spawnEnemy()}plants.forEach(p=>shoot(p,dt));enemies.forEach(e=>{e.x-=e.sp*dt;e.model.position.x=e.x;e.model.rotation.z=Math.sin(now*.008+e.x)*.08;if(e.x<cellPos(e.r,0).x-.9&&!e.dead){e.dead=true;baseHp--;board.remove(e.model);navigator.vibrate&&navigator.vibrate(60);if(baseHp<=0)lose()}});bullets.forEach(b=>{b.x+=b.sp*dt;b.model.position.x=b.x;b.model.rotation.y+=dt*8;const t=enemies.find(e=>!e.dead&&e.r===b.r&&Math.abs(e.x-b.x)<.35);if(t){t.hp-=b.dmg;b.dead=true;if(t.hp<=0){t.dead=true;energy+=8;board.remove(t.model)}else t.model.scale.set(1.18,.82,1.18)}if(b.x>cellPos(0,COLS-1).x+2)b.dead=true});plants.forEach(p=>{p.model.position.y=.05+Math.sin(now*.004+p.c)*.04;p.model.scale.lerp(new THREE.Vector3(1,1,1),.12)});enemies.forEach(e=>e.model.scale.lerp(new THREE.Vector3(1,1,1),.12));bullets.filter(b=>b.dead).forEach(b=>board.remove(b.model));enemies=enemies.filter(e=>!e.dead);bullets=bullets.filter(b=>!b.dead);if(spawned>=total&&enemies.length===0)win();updateUI()}renderer.render(scene,camera)}
boardBuild();renderCards();updateUI();requestAnimationFrame(loop);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
