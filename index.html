<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Pet House Defense Engine V2</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;background:#7fd8ff;color:#fff}
#game{position:fixed;inset:0}
#ui{position:fixed;inset:0;pointer-events:none}
.top{position:absolute;left:10px;right:10px;top:10px;height:104px;background:linear-gradient(#8b5129,#51270f);border-radius:16px;box-shadow:0 6px 0 #2e1609,0 12px 22px #0006;display:flex;align-items:center;gap:8px;padding:8px;pointer-events:auto}
.energy{width:86px;height:86px;border-radius:14px;background:#261309;color:#fff06a;text-align:center;font-weight:bold;padding-top:7px;box-shadow:inset 0 0 0 3px #c48943}.energy .sun{font-size:34px}
.cards{display:flex;gap:8px;overflow-x:auto;flex:1;height:90px;align-items:center}
.card{min-width:88px;height:86px;background:linear-gradient(#fff,#dff3ff);border:3px solid #2b170b;border-radius:10px;box-shadow:0 4px 0 #1d0f07;color:#321c0a;text-align:center;font-weight:bold;position:relative}.card.active{outline:4px solid #ffd22e}.card .icon{font-size:30px;margin-top:5px}.card .name{font-size:11px}.card .cost{position:absolute;left:0;right:0;bottom:0;background:#f4e4b6;font-size:13px;padding:2px}
.menuBtn{width:78px;height:66px;border:0;border-radius:12px;background:linear-gradient(#e6eef8,#667080);box-shadow:0 5px 0 #30333a;color:white;font-size:17px;font-weight:bold}
.leftHud{position:absolute;left:12px;top:126px;display:grid;gap:8px}.wood{background:linear-gradient(#8b5129,#51270f);border-radius:10px;padding:8px;box-shadow:0 4px 0 #2e1609;font-weight:bold;text-align:center;text-shadow:0 2px #000}
.bottom{position:absolute;left:10px;right:10px;bottom:10px;display:flex;align-items:end;justify-content:space-between}.progress{width:250px;height:24px;border:3px solid #111;border-radius:20px;background:#263326;overflow:hidden}.progress i{display:block;height:100%;background:linear-gradient(90deg,#5fd34a,#cfff5a);width:0%}.btn{pointer-events:auto;border:0;border-radius:12px;background:#333;color:white;font-weight:bold;padding:12px 16px}
.centerMsg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#000b;border:2px solid #fff5;border-radius:24px;padding:24px;text-align:center;display:none;pointer-events:auto}.centerMsg h2{font-size:34px;margin:0 0 10px}.centerMsg button{font-size:18px;margin:5px;border:0;border-radius:14px;padding:12px 18px;background:#ffd04a;font-weight:bold}
.tip{position:absolute;left:50%;top:122px;transform:translateX(-50%);background:#0007;border-radius:999px;padding:6px 12px;font-size:13px}
@media(max-width:700px){.top{height:96px}.energy{width:72px;height:78px}.card{min-width:76px;height:78px}.card .icon{font-size:24px}.menuBtn{width:62px;font-size:14px}.leftHud{display:none}.progress{width:135px}.tip{display:none}}
</style>
</head>
<body>
<div id="game"></div>
<div id="ui">
  <div class="top">
    <div class="energy"><div class="sun">☀️</div><div id="energy">160</div></div>
    <div class="cards" id="cards"></div>
    <button class="menuBtn" onclick="restart()">Reset</button>
  </div>
  <div class="tip">Engine V2: ตัวละครเป็นโมเดล 3D Chibi แยกชิ้น + สนาม 3D + เอฟเฟกต์</div>
  <div class="leftHud">
    <div class="wood">WAVE<br><span id="wave">1</span></div>
    <div class="wood">HP<br><span id="hp">20/20</span></div>
  </div>
  <div class="bottom">
    <div class="wood">Engine V2<br>Real 3D Shapes</div>
    <button class="btn" onclick="toggleTime()">Day / Night</button>
    <div class="progress"><i id="progress"></i></div>
  </div>
  <div class="centerMsg" id="msg">
    <h2 id="msgTitle"></h2>
    <p id="msgText"></p>
    <button onclick="restart()">เล่นใหม่</button>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

const ROWS=5,COLS=9, cellW=1.55, cellD=1.32;
const heroes=[
 {id:'brisky',name:'BRISKY',icon:'🐶',cost:40,color:0xc77b3b,skin:0xd49a67,atk:18,rate:.85,bullet:0xf1e56b,type:'dog'},
 {id:'mio',name:'MIO',icon:'🐱',cost:50,color:0x4964d8,skin:0x9aa0aa,atk:36,rate:1.15,bullet:0xb761ff,type:'catMage',magic:true},
 {id:'gabby',name:'GABBY',icon:'🦆',cost:60,color:0xffd64a,skin:0xfff1c7,atk:20,rate:.65,bullet:0xcbd1d7,type:'duck'},
 {id:'wind',name:'WIND',icon:'🏹',cost:60,color:0x36a65a,skin:0xf0c28c,atk:32,rate:.95,bullet:0x8ef2ff,type:'archer'},
 {id:'titan',name:'TITAN',icon:'🛡️',cost:70,color:0x2e73d9,skin:0xf0c28c,atk:0,rate:0,wall:true,type:'knight'},
 {id:'rian',name:'RIAN',icon:'⚔️',cost:90,color:0xffb02e,skin:0xf0c28c,atk:62,rate:1.1,bullet:0xffffff,type:'boy'},
 {id:'kaisen',name:'KAISEN',icon:'🗡️',cost:120,color:0x1d8b48,skin:0xf0c28c,atk:54,rate:.78,bullet:0x37ff62,type:'swordsman'}
];

let selected='brisky', energy=160, baseHp=20, spawned=0, total=55, gameOver=false, night=false;
let plants=[], enemies=[], bullets=[], stars=[], spawnTimer=0, starTimer=0, last=0;

const scene=new THREE.Scene(); scene.background=new THREE.Color(0x9be7ff); scene.fog=new THREE.Fog(0x9be7ff,18,42);
const camera=new THREE.PerspectiveCamera(43,innerWidth/innerHeight,.1,100); camera.position.set(0,13.5,12.8); camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:true}); renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap; game.appendChild(renderer.domElement);
const hemi=new THREE.HemisphereLight(0xffffff,0x557a4c,1.05); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xffffff,1.55); sun.position.set(-7,13,8); sun.castShadow=true; sun.shadow.mapSize.set(2048,2048); scene.add(sun);
const board=new THREE.Group(); scene.add(board);
const startX=-(COLS-1)*cellW/2, startZ=-(ROWS-1)*cellD/2;
const raycaster=new THREE.Raycaster(), pointer=new THREE.Vector2(), placeMeshes=[];

function mat(color,rough=.65,metal=.03){return new THREE.MeshStandardMaterial({color,roughness:rough,metalness:metal})}
function cellPos(r,c){return new THREE.Vector3(startX+c*cellW,0,startZ+r*cellD)}
function box(w,h,d,color){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(color));m.castShadow=true;m.receiveShadow=true;return m}
function sphere(r,color,seg=32){const m=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg*.65),mat(color));m.castShadow=true;m.receiveShadow=true;return m}
function cone(r,h,color,s=32){const m=new THREE.Mesh(new THREE.ConeGeometry(r,h,s),mat(color));m.castShadow=true;m.receiveShadow=true;return m}
function cyl(r,h,color,s=24){const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),mat(color));m.castShadow=true;m.receiveShadow=true;return m}

function boardBuild(){
 const base=box(COLS*cellW+1,.35,ROWS*cellD+1,0x2f792c);base.position.y=-.25;board.add(base);
 for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
   const tile=box(cellW*.98,.16,cellD*.98,(r+c)%2?0x58ba43:0x65c94e);
   const p=cellPos(r,c);tile.position.set(p.x,0,p.z);tile.userData={r,c,place:c<6};board.add(tile);placeMeshes.push(tile);
   if(c<6){const rim=box(cellW*.92,.025,cellD*.92,0xffffff);rim.material.transparent=true;rim.material.opacity=.08;rim.position.set(p.x,.105,p.z);board.add(rim)}
 }
 // 3D pet house
 const house=new THREE.Group();
 const body=box(1.18,1.15,1.05,0xc98345);body.position.y=.67;house.add(body);
 const roof=cone(.95,.75,0x2384d1,4);roof.rotation.y=Math.PI/4;roof.scale.z=.75;roof.position.y=1.58;house.add(roof);
 const door=box(.42,.55,.08,0x3b2618);door.position.set(0,.33,.57);house.add(door);
 const paw=sphere(.07,0x2b1a12); paw.position.set(0,.76,.61);house.add(paw);
 for(const x of[-.12,.12]){const p=sphere(.04,0x2b1a12);p.position.set(x,.86,.61);house.add(p)}
 house.position.copy(cellPos(2,0));house.position.x-=.92;house.position.z-=.05;board.add(house);

 // fence/back decorations
 for(let i=0;i<14;i++){const f=box(.16,1.1,.12,0xe1d4b5);f.position.set(startX-1.1+i*.9,.38,startZ-1.22);board.add(f)}
}

function addEyes(g,y=1.13,z=.36){
 for(const x of[-.13,.13]){
   const eye=sphere(.055,0xffffff,16);eye.position.set(x,y,z);g.add(eye);
   const p=sphere(.025,0x111111,12);p.position.set(x,y-.01,z+.045);g.add(p);
 }
}

function addLegs(g,color=0x4a2a15){
 for(const x of[-.18,.18]){
   const leg=cyl(.07,.35,color);leg.position.set(x,.24,0);g.add(leg);
   const foot=box(.22,.12,.32,color);foot.position.set(x,.05,.12);g.add(foot);
 }
}

function makeHeroModel(h){
  const g=new THREE.Group();
  const body=sphere(.34,h.color); body.scale.set(1,.98,.82); body.position.y=.62; g.add(body);
  const head=sphere(.42,h.skin); head.position.y=1.12; g.add(head);
  addEyes(g,1.17,.36);
  addLegs(g);

  if(h.type==='dog'){
    for(const x of[-.3,.3]){const ear=cone(.13,.42,0x8d5b35);ear.position.set(x,1.4,.02);ear.rotation.z=x<0?.55:-.55;g.add(ear)}
    const muzzle=sphere(.16,0xf1d2ad);muzzle.scale.set(1.2,.7,.7);muzzle.position.set(0,1.05,.39);g.add(muzzle);
    const scarf=box(.55,.13,.15,0xe7bb37);scarf.position.set(0,.88,.23);g.add(scarf);
  }
  if(h.type==='catMage'){
    for(const x of[-.27,.27]){const ear=cone(.12,.34,0x8f96a0);ear.position.set(x,1.42,.02);ear.rotation.z=x<0?.45:-.45;g.add(ear)}
    const hat=cone(.35,.78,0x273898);hat.position.y=1.66;g.add(hat);
    const brim=cyl(.39,.06,0x273898);brim.rotation.x=Math.PI/2;brim.position.y=1.35;g.add(brim);
    const staff=cyl(.035,1.1,0x7b542d);staff.position.set(.48,.7,.12);staff.rotation.z=.15;g.add(staff);
    const gem=sphere(.11,0x39a8ff);gem.position.set(.55,1.25,.15);g.add(gem);
  }
  if(h.type==='duck'){
    const beak=box(.26,.12,.22,0xff8d24);beak.position.set(0,1.09,.43);g.add(beak);
    const pack=box(.38,.55,.22,0x66503b);pack.position.set(0,.7,-.32);g.add(pack);
    const wrench=box(.12,.65,.08,0xcfd4d9);wrench.position.set(.45,.75,.1);wrench.rotation.z=.3;g.add(wrench);
  }
  if(h.type==='archer'){
    const hair=cone(.36,.32,0xe8e8e8);hair.position.y=1.46;g.add(hair);
    const bow=new THREE.Mesh(new THREE.TorusGeometry(.32,.025,8,32,Math.PI*1.35),mat(0x6b3d19));bow.position.set(.46,.78,.16);bow.rotation.x=Math.PI/2;bow.rotation.z=.55;g.add(bow);
    const cape=box(.5,.75,.08,0x1f7a3f);cape.position.set(0,.65,-.36);g.add(cape);
  }
  if(h.type==='knight'){
    const helm=sphere(.44,0xb8c7d5);helm.scale.y=.65;helm.position.y=1.12;g.add(helm);
    const shield=box(.46,.6,.1,0x2a69c7);shield.position.set(.45,.66,.12);g.add(shield);
    const blade=box(.08,.82,.08,0xddefff);blade.position.set(-.45,.78,.1);blade.rotation.z=.4;g.add(blade);
  }
  if(h.type==='boy'){
    const hair=cone(.35,.35,0x3b1d12);hair.position.y=1.46;g.add(hair);
    const scarf=box(.65,.12,.13,0xd13c2f);scarf.position.set(0,.86,.22);g.add(scarf);
    const sword=box(.07,.78,.07,0xddefff);sword.position.set(.47,.76,.12);sword.rotation.z=-.35;g.add(sword);
  }
  if(h.type==='swordsman'){
    const hair=cone(.36,.35,0x2e9b5a);hair.position.y=1.46;g.add(hair);
    for(const x of[-.43,.43]){const sw=box(.07,.82,.07,0xddefff);sw.position.set(x,.77,.12);sw.rotation.z=x<0?.4:-.4;g.add(sw)}
  }
  return g;
}

function enemyModel(kind){
 const g=new THREE.Group(), col=kind==='tank'?0x7c9672:kind==='runner'?0x95c983:0x78b66c;
 const body=sphere(.42,col);body.scale.set(1,1.05,.85);body.position.y=.72;g.add(body);
 const head=sphere(.38,col);head.position.y=1.18;g.add(head);addEyes(g,1.2,.33);
 for(const x of[-.34,.34]){const ear=cone(.12,.38,col);ear.position.set(x,1.25,0);ear.rotation.z=x<0?.95:-.95;g.add(ear)}
 addLegs(g,0x4b382e);
 if(kind==='tank'){const helm=box(.72,.2,.55,0x777777);helm.position.y=1.49;g.add(helm)}
 return g;
}

function renderCards(){
  cards.innerHTML='';
  for(const h of heroes){
    const b=document.createElement('button'); b.className='card '+(selected===h.id?'active':'');
    b.innerHTML=`<div class="name">${h.name}</div><div class="icon">${h.icon}</div><div class="cost">☀️ ${h.cost}</div>`;
    b.onclick=()=>{selected=h.id;renderCards()}; cards.appendChild(b);
  }
}
function updateUI(){
  energyEl.textContent=Math.floor(energy);
  hp.textContent=baseHp+'/20';
  wave.textContent=Math.min(10,Math.ceil(spawned/Math.max(1,total/10)))+'/10';
  progress.style.width=(spawned/total*100)+'%';
}
function flashEnergy(){energyEl.animate([{transform:'scale(1)'},{transform:'scale(1.3)'},{transform:'scale(1)'}],{duration:220});navigator.vibrate&&navigator.vibrate(35)}
function placeHero(r,c){
  if(gameOver||c>5||plants.some(p=>p.r===r&&p.c===c))return;
  const h=heroes.find(x=>x.id===selected);
  if(!h||energy<h.cost){flashEnergy();return}
  energy-=h.cost;
  const model=makeHeroModel(h),p=cellPos(r,c);
  model.position.set(p.x,.05,p.z);board.add(model);
  plants.push({r,c,h,model,cd:.25,hp:h.wall?900:150});
  navigator.vibrate&&navigator.vibrate(20);updateUI();
}
function spawnEnemy(){
  if(spawned>=total)return;
  spawned++;
  const r=Math.floor(Math.random()*ROWS),tank=Math.random()<.22,runner=!tank&&Math.random()<.22,kind=tank?'tank':runner?'runner':'goblin';
  const model=enemyModel(kind),p=cellPos(r,COLS-1);
  model.position.set(p.x+2,.05,p.z);board.add(model);
  enemies.push({r,x:p.x+2,z:p.z,hp:tank?180:95,max:tank?180:95,sp:runner?1.35:tank?.55:.85,model});
}
function shoot(p,dt){
  if(p.h.wall)return;
  p.cd-=dt;
  const target=enemies.find(e=>e.r===p.r&&e.x>p.model.position.x);
  if(target&&p.cd<=0){
    p.cd=p.h.rate;
    p.model.scale.set(1.18,.92,1.18);
    const m=new THREE.Mesh(new THREE.SphereGeometry(.13,16,12),new THREE.MeshStandardMaterial({color:p.h.bullet,emissive:p.h.bullet,emissiveIntensity:.4}));
    m.position.set(p.model.position.x+.5,.85,p.model.position.z);m.castShadow=true;board.add(m);
    bullets.push({model:m,r:p.r,x:m.position.x,dmg:p.h.atk,sp:p.h.magic?3.2:4.2});
  }
}
function hitEffect(x,z){
  const m=sphere(.16,0xfff2a0,16);m.material.transparent=true;m.material.opacity=.85;m.position.set(x,.9,z);board.add(m);
  const start=performance.now();
  function grow(){const t=(performance.now()-start)/320;if(t>=1){board.remove(m);return}m.scale.setScalar(1+t*3);m.material.opacity=.85*(1-t);requestAnimationFrame(grow)}grow();
}
function win(){gameOver=true;msgTitle.textContent='ผ่านด่านแล้ว 🎉';msgText.textContent='Engine V2: 3D Chibi + WebGL ทำงานสำเร็จ';msg.style.display='block'}
function lose(){gameOver=true;msgTitle.textContent='แพ้แล้ว 😭';msgText.textContent='ศัตรูบุกถึงบ้าน';msg.style.display='block'}
function restart(){
  plants.forEach(o=>board.remove(o.model));enemies.forEach(o=>board.remove(o.model));bullets.forEach(o=>board.remove(o.model));
  plants=[];enemies=[];bullets=[];energy=160;baseHp=20;spawned=0;spawnTimer=0;gameOver=false;msg.style.display='none';updateUI();
}
window.restart=restart;
window.toggleTime=()=>{night=!night;scene.background.set(night?0x14213f:0x9be7ff);scene.fog.color.set(night?0x14213f:0x9be7ff);sun.intensity=night?.45:1.55;hemi.intensity=night?.55:1.05}

renderer.domElement.addEventListener('pointerdown',ev=>{
  const rect=renderer.domElement.getBoundingClientRect();
  pointer.x=((ev.clientX-rect.left)/rect.width)*2-1;pointer.y=-((ev.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(pointer,camera);
  const hit=raycaster.intersectObjects(placeMeshes,false)[0];
  if(hit){const d=hit.object.userData;if(d.place)placeHero(d.r,d.c)}
});

function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min(.05,(now-last)/1000||0);last=now;
  if(!gameOver){
    spawnTimer+=dt;
    if(spawnTimer>Math.max(.72,2.1-spawned*.018)){spawnTimer=0;spawnEnemy()}
    plants.forEach(p=>shoot(p,dt));
    enemies.forEach(e=>{
      e.x-=e.sp*dt;e.model.position.x=e.x;e.model.rotation.z=Math.sin(now*.008+e.x)*.08;
      if(e.x<cellPos(e.r,0).x-.9&&!e.dead){e.dead=true;baseHp--;board.remove(e.model);navigator.vibrate&&navigator.vibrate(60);if(baseHp<=0)lose()}
    });
    bullets.forEach(b=>{
      b.x+=b.sp*dt;b.model.position.x=b.x;b.model.rotation.y+=dt*8;
      const t=enemies.find(e=>!e.dead&&e.r===b.r&&Math.abs(e.x-b.x)<.35);
      if(t){t.hp-=b.dmg;b.dead=true;hitEffect(t.x,t.z);if(t.hp<=0){t.dead=true;energy+=8;board.remove(t.model)}else t.model.scale.set(1.18,.82,1.18)}
      if(b.x>cellPos(0,COLS-1).x+2)b.dead=true;
    });
    plants.forEach(p=>{p.model.position.y=.05+Math.sin(now*.004+p.c)*.04;p.model.scale.lerp(new THREE.Vector3(1,1,1),.12)});
    enemies.forEach(e=>e.model.scale.lerp(new THREE.Vector3(1,1,1),.12));
    bullets.filter(b=>b.dead).forEach(b=>board.remove(b.model));
    enemies=enemies.filter(e=>!e.dead);bullets=bullets.filter(b=>!b.dead);
    if(spawned>=total&&enemies.length===0)win();
    updateUI();
  }
  renderer.render(scene,camera);
}
boardBuild();renderCards();updateUI();requestAnimationFrame(loop);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
